<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-900 flex justify-center items-center min-h-screen">
    <div class="shadow-lg max-w-sm w-full bg-gray-500 p-8 rounded-lg shadow-lg flex items-center flex-col">
    <h2 class="text-2xl font-bold mb-6 text-white">
        Login 
    </h2>
    <form>
        <div class="mb-4 w-full">
            <label for="email" class="block text-sm font-medium text-gray-300 mb-2">Email</label>
            <input 
            class="w-full px-3 py-2 bg-gray-600 rounded-md text-white
            focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" 
            type="email" id="email" name="email" required>
        </div>
        <div class="mb-4">
            <label for="password" class="block text-sm font-medium text-gray-300 mb-2">Password</label>
            <input
            class="w-full px-3 py-2 bg-gray-600 rounded-md text-white
            focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            type="password" id="password" name="password" required>
        </div>
        <button 
        class="shadow-lg w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg focus:outline-none focus:shadow-outline"
        type="submit">Login</button>
    </form>
    </div>
</body>
</html>
