<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <script src="./script.js" defer></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="flex min-h-screen items-center justify-center bg-red-300 p-4">

    <div class="w-full max-w-sm rounded-xl bg-red-400 p-6 shadow-md">

        <h1 class="mb-4 text-center text-2xl font-bold text-white">
            To Do List
        </h1>

        <form id="todo-form" class="flex gap-2 mb-4">
            <input
                type="text"
                id="todo-input"
                placeholder="Enter the event..."
                class="w-full rounded-lg bg-white px-3 py-2 text-gray-800 outline-none focus:ring-2 focus:ring-white/50"
            >

            <button
                type="submit"
                id="add-task-btn"
                class="rounded-lg bg-white px-4 py-2 font-bold text-red-500 hover:bg-red-50"
            >
                Add
            </button>
        </form>

        <ul id="todo-list" class="space-y-2"></ul>

    </div>

</body>
</html>
