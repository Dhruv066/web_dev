<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <div class="card">

            <h1>Age Calculator</h1>
            <p>Enter your Date of Birth</p>

            <div class="input-box">
                <input type="date" id="dob" title="dob">
                <button id="calculate">Calculate Age</button>
            </div>

            <div class="result">
                <h2>Your Age</h2>

                <div class="age-box">

                    <div class="box">
                        <span id="years">00</span>
                        <p>Years</p>
                    </div>

                    <div class="box">
                        <span id="months">00</span>
                        <p>Months</p>
                    </div>

                    <div class="box">
                        <span id="days">00</span>
                        <p>Days</p>
                    </div>

                </div>
            </div>

        </div>

    </div>
    <script src="./script.js"></script>
</body>
</html>
