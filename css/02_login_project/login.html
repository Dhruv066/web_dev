<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family:Arial, Helvetica, sans-serif;
            background-color: #1a1a1a;
            margin:0;
            padding:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;

        }
        .card{
            background-color:#e4e1e1;
            border-radius :8px;
            padding:30px;
            width:300px;
        }
        h2{
            color:blue;
            text-align:center;
            margin-bottom:20px;
        }
        form{
            display:flex;
            flex-direction:column;
            /* gap:25px; */
        }
        input{
            margin-bottom:15px;
            padding:10px;
            border-radius:4px;
            border:1px solid #424040;
            /* border: none; */
            background-color: #dcdada;
        }
        button{
            padding:10px;
            border-radius:4px;
            border:none;
            background-color:rgb(123, 123, 227);
            color:white;
            cursor:pointer;
        }
        button:hover{
            background-color:rgb(123, 123, 227,0.8);
        }

    </style>
</head>
<body>
    <div class="card">
        <h2>Login</h2>
        <form>
            <input type="email" title="Enter email" id="" placeholder="Email">
            <input type="password" title="Enter Password" id="" placeholder="Password">
            <button for="login" type="submit" title="login">Login</button>
        </form>
    </div>
</body>
</html>
