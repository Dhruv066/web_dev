<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>navbar</title>
    <style>
        *{
            margin:0;
            padding:0;
            /* box-sizing:content-box; */
        }
        body{
            font-family:Arial, Helvetica, sans-serif;
            background-color: beige;
        }
        .navbar{
            background-color: #1a1a1a;
            color:white;
            display:flex;
            justify-content:space-between ;
            align-items:center;
            padding:10px 20px;
        }
        ul li {
            list-style:none;
            display:inline-block;
            margin-left:20px;
            
        }
        ul li a{
            text-decoration:none;
            color:white;
            font-size:18px;
        }
        ul li a:hover{
            color:rgb(123, 123, 227);
            
        }
        ul li a::after{
            content:'';
            display:block;
            width:0;
            height:2px;
            background-color:rgb(123, 123, 227);
            transition: 0.3s ease-out;
            
        }
        ul li a:hover::after{
            width:100%;
            
        }
    </style>
</head>
<body>
    <header>
        <div class="navbar">
            <h1>My Website</h1>
            <nav>
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Services</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </nav>
        </div>

        <div class="navbar">
            <h1>My Website</h1>
            <nav>
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Services</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>
</body>
</html>
