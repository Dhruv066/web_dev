<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: #f9b2b2;
            color: #270505;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
        }
        .container{
            background-color:beige;
            width: 80%;
            margin: 0 auto;
            padding: 20px;
        }
        .grid-container {
            display: grid;
            gap: 20px;
            border: 5px solid #424141;
            padding: 5px;

        }
        .box:nth-child(odd){
            background-color: #fa6e03;
            
        }
        .box:nth-child(even){
            background-color: #0ba1f7;
            
        }
        .box{
            border: #0ba1f7;
            text-align: center;
            padding: 20px;
            font-size: 18px;
        
        }
    </style>
</head>
<body>
    <h1>css grid masterclass</h1>
    <div class="container">
        <div class="grid-container"
        style="grid-template-columns: repeat(3,2fr);
        grid-template-columns: repeat(3, 1fr)">
            <div class="box">1</div>
            <div class="box">2</div>
            <div class="box">3</div>
            <div class="box">4</div>
            <div class="box">5</div>
            <div class="box">6</div>
            <div class="box">7</div>
            <div class="box">8</div>
            <div class="box">9</div>
        </div>
    </div>
    <div class="container">
        <div class="grid-container"
        style="grid-template-columns: 1fr 2fr 3fr;"
        >
            <div class="box" >1</div>
            <div class="box">2</div>
            <div class="box">3</div>
            <div class="box">4</div>
            <div class="box">5</div>
            <div class="box">6</div>
            <div class="box">7</div>
            <div class="box">8</div>
            <div class="box">9</div>
        </div>
    </div>
    <div class="container">
        <div class="grid-container"
        style="
        grid-template-areas:'header header header' 'sidebar main main'
        'footer footer footer';
        ">
            <div class="box" style="grid-area:header">1</div>
            <div class="box" style="grid-area:sidebar">2</div>
            <div class="box" style="grid-area:main">3</div>
            <div class="box" style="grid-area:footer">4</div>
        </div>
    </div>
        <div class="container">
      <h2>6. Auto-Fit and Minmax</h2>
      <div
        class="grid-container"
        style="grid-template-columns: repeat(auto-fit, minmax(100px, 1fr))"
      >
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
      </div>
    </div>

    <div class="container">
      <h2>7. Alignment and Justification</h2>
      <div
        class="grid-container"
        style="
          grid-template-columns: repeat(3, 1fr);
          height: 200px;

          align-items: center;
        "
      >
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
      </div>
    </div>

    <div class="container">
      <h2>8. Nested Grids</h2>
      <div class="grid-container" style="grid-template-columns: 1fr 1fr">
        <div class="box">1</div>
        <div class="grid-container" style="grid-template-columns: 1fr 1fr">
          <div class="box" style="background-color: #27ae60">2.1</div>
          <div class="box" style="background-color: #27ae60">2.2</div>
          <div class="box" style="background-color: #27ae60">2.3</div>
          <div class="box" style="background-color: #27ae60">2.4</div>
        </div>
      </div>
    </div>

    <div class="container">
      <h2>9. Grid with Auto Rows</h2>
      <div class="grid-container" style="grid-template-columns: repeat(3, 1fr)">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box" style="padding: 40px">
          5 (taller content) and there is more content
        </div>
        <div class="box">6</div>
      </div>
    </div>
</body>
</html>
